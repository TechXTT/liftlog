name: liftlog_app
description: "LiftLog — personal iPhone-first tracker for calories, protein, body metrics, and gym workouts."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Local persistence
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.5
  path: ^1.9.0

  # iOS share sheet (data export, issue #37). Standard Flutter wrapper
  # for UIActivityViewController — covers Save to Files / email / AirDrop
  # without Info.plist gymnastics. Alternative (enabling
  # UIFileSharingEnabled + surfacing Documents in iOS Files) requires
  # discovery UX most users won't find.
  share_plus: ^13.1.0

  # iOS document picker for inbound restore (data import, issue #41).
  # `share_plus` is outbound only — no pub dep covers the inbound
  # UIDocumentPickerViewController surface except `file_picker`. Pinned
  # to the current stable major (11.x) per PR discipline; bumps require
  # a justification in the PR body. (The 8.x line conflicts with
  # `share_plus ^13` on `win32` constraints — 11.x resolves cleanly.)
  file_picker: ^11.0.0

  # HealthKit bridge (body-weight read, issue #43). Apple-native HealthKit
  # Dart bridge — maintained, avoids writing a custom method-channel on
  # top of HKHealthStore. Alternatives considered: custom method-channel
  # (rejected — boilerplate for a bridge that already exists) and
  # `health_kit_reporter` (rejected — less active, narrower coverage).
  # Pinned to the current stable major (13.x); bumps require a
  # justification in the PR body.
  health: ^13.3.1

  # App metadata (version / build number / bundle id) for the Settings →
  # About section (issue #48). Standard Flutter-team-maintained wrapper
  # for `NSBundle` / `PackageManager`. Alternatives considered: hardcoding
  # a const (rejected — would drift from `pubspec.yaml`'s version on every
  # bump) and reading `pubspec.yaml` at runtime via `rootBundle` (rejected
  # — `pubspec.yaml` is not bundled as an asset by default and bundle-id /
  # build-number still require a native lookup).
  #
  # Pinned to 9.x (not the latest 10.x) because 10.x's Windows source
  # requires `win32 ^6.x`, which conflicts with our existing
  # `dependency_overrides: win32: ^5.9.0` (itself a stopgap to keep
  # share_plus + file_picker Windows sources compilable under
  # `flutter test` on macOS — the Dart VM compiles the package's Windows
  # code path unconditionally). 9.0.1 is the most recent release on the
  # `win32 ^5` line and still actively supported. Revisit when the
  # win32-5 override goes away.
  package_info_plus: ^9.0.1

  # SPIKE (issue #63): flutter_cloud_kit for E3 CloudKit viability research.
  # DO NOT MERGE — this dep is on spike/cloudkit-e3-viability only.
  # MIT, 43 stars, 2-year-old release. Exposes CKContainer / CKDatabase /
  # CKRecord / CKRecordType queries. Missing CKRecordZone, CKQuerySubscription,
  # change tokens. Evaluated in vault/06 Spikes/E3 CloudKit viability.
  flutter_cloud_kit: ^0.0.3

  # iOS "Open Settings" deep link from the Settings → HealthKit section
  # (issue #48). Standard Flutter-team-maintained wrapper for
  # `UIApplication.openURL:`. We only use `launchUrl(Uri.parse('app-settings:'))`
  # — the iOS `app-settings:` URL scheme routes to this app's page inside
  # the system Settings app. Alternatives considered: rolling a method
  # channel (rejected — one-line wrapper, not worth the native boilerplate)
  # and shipping no CTA (rejected — users on "Not authorized" need a path
  # to fix it without hunting in Settings). Pinned to the current stable
  # major (6.x).
  url_launcher: ^6.3.2

# iOS-only app: `win32` is a transitive Dart FFI dep of `file_picker`
# (^5.9.0) and `share_plus` (^6.0.1) whose version ranges don't overlap.
# Neither version is actually loaded on iOS (the plugin code path is
# native, not Dart FFI to Windows), so we pin to the older `5.9.x`
# line to keep file_picker's Windows-platform source compilable under
# `flutter test` on macOS (the Dart VM unconditionally compiles the
# package's Windows code path). If LiftLog ever targets Windows,
# revisit: share_plus 13.x on Windows would need the newer `^6` line.
dependency_overrides:
  win32: ^5.9.0
  # Stopgap: device_info_plus 12.x calls NSProcessInfo.isiOSAppOnVision
  # unguarded (no @available check). That selector is absent from
  # Xcode 26.0.1's iOS 26.0 SDK — compiles locally on Xcode 26.4+ only.
  # GitHub's macos-latest runner only ships Xcode 26.0.1 in its Xcode 26
  # line, so CI iOS build fails. 11.3.0 predates the unguarded call.
  # `health 13.3.1`'s runtime code that actually uses device_info_plus
  # only needs platform-info APIs present in 11.x; verified no 12-specific
  # API is required on the health code path. Revisit when either:
  # (a) device_info_plus publishes a version with an @available guard,
  # (b) GitHub's runner image ships Xcode 26.4+,
  # (c) we retire `health` in favour of a lighter HealthKit bridge.
  # Tracked in vault/current_state.md → Open items.
  device_info_plus: 11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Codegen for Drift
  build_runner: ^2.4.13
  drift_dev: ^2.20.3

flutter:
  uses-material-design: true
