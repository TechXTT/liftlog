name: liftlog_app
description: "LiftLog — personal iPhone-first tracker for calories, protein, body metrics, and gym workouts."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Local persistence
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.5
  path: ^1.9.0

  # iOS share sheet (data export, issue #37). Standard Flutter wrapper
  # for UIActivityViewController — covers Save to Files / email / AirDrop
  # without Info.plist gymnastics. Alternative (enabling
  # UIFileSharingEnabled + surfacing Documents in iOS Files) requires
  # discovery UX most users won't find.
  share_plus: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Codegen for Drift
  build_runner: ^2.4.13
  drift_dev: ^2.20.3

flutter:
  uses-material-design: true
