name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  # Cancel older runs on the same ref — saves minutes on iterative pushes.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter:
    name: analyze + test + iOS build
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # Pinned to match CLAUDE.md's "Tech stack (actual)" section. Bump
          # in lockstep with local Flutter upgrades.
          flutter-version: '3.41.7'
          channel: 'stable'
          cache: true

      - name: Select Xcode 26 (match local dev toolchain)
        # GitHub's macos-latest defaults to Xcode 16.4 (iOS 18.5 SDK) as of
        # 2026-04-24. Our local dev is Xcode 26.x; some plugins (notably
        # device_info_plus 12.4.0 → NSProcessInfo.isiOSAppOnVision) expect
        # iOS 26 SDK declarations and fail on older Xcodes with
        # "No visible @interface ... declares the selector" Clang errors.
        #
        # The runner image has Xcode 26.0.1 installed — select it. Diagnostic
        # below confirms the choice on every run so we never wonder again.
        run: sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Diagnose toolchain (Xcode + SDK versions)
        # Keep this on for one or two more runs after the S4.3 CI resolves,
        # then remove. Cheap insurance while we verify the fix holds.
        run: |
          echo "=== xcode-select -p ===" && sudo xcode-select -p
          echo "=== xcodebuild -version ===" && xcodebuild -version
          echo "=== iphoneos SDK version ===" && xcrun --sdk iphoneos --show-sdk-version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        # --timeout=60s matches our local convention for the arch test + Drift
        # integration test; widget tests finish in well under a second each.
        run: flutter test --timeout=60s

      - name: Build iOS (debug, no codesign)
        # Catches Podfile / Info.plist / asset-path regressions that the other
        # steps miss. No signing, no simulator boot, no device — code-level
        # build validation only (matches the 2026-04-23 PM verification policy).
        run: flutter build ios --debug --no-codesign
